# ============================================================
# Frontend Service — Deployment + Service
#
# Construir imagen (desde la raíz del repo):
#   docker build -f microservices/frontend-service/Dockerfile \
#     -t pesito/frontend-service:latest ./microservices/frontend-service
#
# Tráfico externo entra por Traefik Ingress → pesito.dev
# El browser llama /api/* → Next.js proxy (server-side) → http://api-gateway:8080
# El browser nunca habla directo a la API.
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: pesito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
        - name: frontend-service
          image: pesito/frontend-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: http://api-gateway:8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: pesito
spec:
  selector:
    app: frontend-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
