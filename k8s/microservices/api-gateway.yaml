# ============================================================
# API Gateway — Deployment + Service
#
# Construir imagen:
#   docker build -f microservices/api-gateway/Dockerfile \
#     -t pesito/api-gateway:latest ./microservices
#
# Tráfico externo entra por Traefik Ingress → api.pesito.dev
# Tráfico interno: frontend proxy → http://api-gateway:8080
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pesito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: pesito/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: JWT_SECRET
            - name: EUREKA_HOST
              value: eureka-server
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pesito
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
