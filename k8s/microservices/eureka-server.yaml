# ============================================================
# Eureka Server — Deployment + Service
#
# IMPORTANTE: Construir la imagen antes de aplicar:
#   eval $(minikube docker-env)
#   docker build -f microservices/eureka-server/Dockerfile \
#     -t budgetbuddy/eureka-server:latest ./microservices
#
# imagePullPolicy: Never indica a Kubernetes que use la imagen
# local en vez de intentar bajarla de Docker Hub.
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: budgetbuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: budgetbuddy/eureka-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: budgetbuddy
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
  type: ClusterIP
