# ============================================================
# Auth Service — Deployment + Service
#
# Construir imagen:
#   eval $(minikube docker-env)
#   docker build -f microservices/auth-service/Dockerfile \
#     -t budgetbuddy/auth-service:latest ./microservices
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: budgetbuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: budgetbuddy/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: budgetbuddy
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AUTH_DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AUTH_DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_PASSWORD
            - name: EUREKA_HOST
              value: eureka-server
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: budgetbuddy
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
