# ============================================================
# Auth Service — Deployment + Service
#
# Construir imagen:
#   eval $(minikube docker-env)
#   docker build -f microservices/auth-service/Dockerfile \
#     -t pesito/auth-service:latest ./microservices
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pesito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: pesito/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: pesito
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AUTH_DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AUTH_DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: JWT_SECRET
            - name: APP_ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: APP_ENCRYPTION_SECRET
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: INTERNAL_API_SECRET
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_PASSWORD
            - name: EUREKA_HOST
              value: eureka-server
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            # OAuth2 — Google y GitHub
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: OAUTH2_REDIRECT_BASE_URL
              value: "https://api.pesito.dev"
            - name: APP_FRONTEND_URL
              value: "https://pesito.dev"
            - name: APP_ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: APP_ENCRYPTION_SECRET
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: INTERNAL_API_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pesito
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
