# ============================================================
# AI Service — Deployment + Service
#
# Construir imagen:
#   eval $(minikube docker-env)
#   docker build -f microservices/ai-service/Dockerfile \
#     -t pesito/ai-service:latest ./microservices
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: pesito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: pesito/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: MONGO_HOST
              value: mongodb
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: MONGO_APP_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: MONGO_APP_PASSWORD
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_PASSWORD
            - name: EUREKA_HOST
              value: eureka-server
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: TRANSACTION_HOST
              value: transaction-service
            - name: AUTH_HOST
              value: auth-service
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: INTERNAL_API_SECRET
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: pesito
            - name: AI_DB_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AI_DB_USER
            - name: AI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: AI_DB_PASSWORD
            # Observabilidad Langfuse (opcional: sin keys queda deshabilitado)
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: LANGFUSE_PUBLIC_KEY
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: LANGFUSE_SECRET_KEY
                  optional: true
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: LANGFUSE_HOST
                  optional: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: pesito
spec:
  selector:
    app: ai-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
