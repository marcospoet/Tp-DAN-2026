# ============================================================
# AI Service — Deployment + Service
#
# Construir imagen:
#   eval $(minikube docker-env)
#   docker build -f microservices/ai-service/Dockerfile \
#     -t budgetbuddy/ai-service:latest ./microservices
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: budgetbuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: budgetbuddy/ai-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: MONGO_HOST
              value: mongodb
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: MONGO_APP_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: MONGO_APP_PASSWORD
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: RABBITMQ_PASSWORD
            - name: EUREKA_HOST
              value: eureka-server
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: budgetbuddy
spec:
  selector:
    app: ai-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
