# ============================================================
# Secrets — BudgetBuddy
#
# IMPORTANTE: Cambiar todos los valores antes de aplicar.
# stringData: Kubernetes los base64-encodea automáticamente.
#
# Aplicar con: kubectl apply -f k8s/01-secrets.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: bb-secrets
  namespace: budgetbuddy
type: Opaque
stringData:
  # PostgreSQL — superusuario
  POSTGRES_PASSWORD: "admin"

  # PostgreSQL — auth-service
  AUTH_DB_USER: "auth_user"
  AUTH_DB_PASSWORD: "admin"

  # PostgreSQL — transaction-service
  TXN_DB_USER: "txn_user"
  TXN_DB_PASSWORD: "admin"

  # MongoDB — usuario root
  MONGO_ROOT_USER: "root"
  MONGO_ROOT_PASSWORD: "admin"

  # MongoDB — usuario de aplicación (ai-service)
  MONGO_APP_USER: "ai_user"
  MONGO_APP_PASSWORD: "admin"

  # RabbitMQ
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "admin"

  # MinIO
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "admin"

  # JWT — usar al menos 64 caracteres aleatorios
  JWT_SECRET: "admin_por_un_secreto_muy_largo_y_seguro_de_al_menos_64_chars"

  # Grafana
  GRAFANA_PASSWORD: "admin"
