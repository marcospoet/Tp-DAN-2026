# ============================================================
# Secrets — BudgetBuddy (EJEMPLO — seguro para commitear)
#
# Copiar como 01-secrets.yaml y reemplazar todos los valores
# marcados con CHANGE_ME antes de aplicar.
#
#   cp k8s/01-secrets.example.yaml k8s/01-secrets.yaml
#
# 01-secrets.yaml está en .gitignore y NUNCA debe commitearse.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: bb-secrets
  namespace: budgetbuddy
type: Opaque
stringData:
  # PostgreSQL — superusuario
  POSTGRES_PASSWORD: "CHANGE_ME"

  # PostgreSQL — auth-service
  AUTH_DB_USER: "auth_user"
  AUTH_DB_PASSWORD: "CHANGE_ME"

  # PostgreSQL — transaction-service
  TXN_DB_USER: "txn_user"
  TXN_DB_PASSWORD: "CHANGE_ME"

  # MongoDB — usuario root
  MONGO_ROOT_USER: "root"
  MONGO_ROOT_PASSWORD: "CHANGE_ME"

  # MongoDB — usuario de aplicación (ai-service)
  MONGO_APP_USER: "ai_user"
  MONGO_APP_PASSWORD: "CHANGE_ME"

  # RabbitMQ — NO usar "guest" (restringido a localhost)
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "CHANGE_ME"

  # MinIO — secret key requiere mínimo 8 caracteres
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "CHANGE_ME_MIN_8_CHARS"

  # JWT — mínimo 64 caracteres aleatorios
  # Generar en PowerShell:
  #   $bytes = New-Object byte[] 64; [System.Security.Cryptography.RandomNumberGenerator]::Create().GetBytes($bytes); [System.BitConverter]::ToString($bytes).Replace('-','').ToLower()
  # Generar en Linux/Mac:
  #   openssl rand -hex 64
  JWT_SECRET: "CHANGE_ME_USE_AT_LEAST_64_RANDOM_CHARACTERS_SEE_COMMENT_ABOVE"

  # Grafana
  GRAFANA_PASSWORD: "CHANGE_ME"
