# ============================================================
# oauth2-proxy — SSO para paneles admin vía Google OAuth
#
# Flujo:
#   browser → grafana.pesito.dev
#   → Traefik llama /oauth2/auth en oauth2-proxy
#   → sin sesión → redirige a Google login
#   → Google callback → oauth.pesito.dev/oauth2/callback
#   → oauth2-proxy setea cookie en .pesito.dev
#   → Traefik deja pasar el request al panel
#
# Setup PREVIO requerido (una sola vez):
#   1. Google Cloud Console → APIs & Services → Credentials
#      → Create OAuth 2.0 Client ID (Web application)
#      → Authorized redirect URIs:
#           https://oauth.pesito.dev/oauth2/callback
#   2. DNS: agregar A record  oauth → 100.25.125.64
#   3. Completar OAUTH2_PROXY_* en k8s/01-secrets.yaml
#   4. Editar el ConfigMap oauth2-proxy-emails con los emails autorizados
# ============================================================

---
# Emails con acceso permitido a los paneles admin.
# Agregar uno por línea. Solo estas cuentas Google pueden entrar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-emails
  namespace: pesito
data:
  emails: |
    marcospoet@gmail.com

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: pesito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=google
            - --http-address=0.0.0.0:4180
            # En modo ForwardAuth no proxeamos — solo autenticamos
            - --upstream=file:///dev/null
            - --redirect-url=https://oauth.pesito.dev/oauth2/callback
            # Cookie compartida entre todos los subdominios *.pesito.dev
            - --cookie-domain=.pesito.dev
            - --whitelist-domain=.pesito.dev
            - --cookie-secure=true
            - --cookie-samesite=lax
            # Ir directo a Google sin página intermedia de oauth2-proxy
            - --skip-provider-button=true
            - --authenticated-emails-file=/etc/oauth2-proxy/emails
            - --silence-ping-path=/ping
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: OAUTH2_PROXY_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: OAUTH2_PROXY_CLIENT_SECRET
            # 32 bytes aleatorios en base64 — ver instrucciones en secrets.example.yaml
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: emails
              mountPath: /etc/oauth2-proxy
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: emails
          configMap:
            name: oauth2-proxy-emails
            items:
              - key: emails
                path: emails

---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: pesito
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
  type: ClusterIP
