# ============================================================
# Loki — Deployment + Service
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: budgetbuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: config
          configMap:
            name: loki-config
            items:
              - key: loki-config.yml
                path: local-config.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: budgetbuddy
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
  type: ClusterIP
