# ============================================================
# AUTH SERVICE — application.properties
# ============================================================

server.port=8081
spring.application.name=auth-service

# ------------------------------------------------------------
# POSTGRESQL — schema: auth
# Credenciales inyectadas como variables de entorno en Docker.
# En local, usa los defaults (requiere que postgres este corriendo
# y que init.sql haya creado el schema y el usuario auth_user)
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pesito}
spring.datasource.username=${AUTH_DB_USER:auth_user}
spring.datasource.password=${AUTH_DB_PASSWORD:auth_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: Hibernate solo valida el schema — Flyway es quien lo crea y migra
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ------------------------------------------------------------
# FLYWAY — Migraciones
# Lee los .sql de src/main/resources/db/migration/ en orden V1__, V2__, ...
# ------------------------------------------------------------
spring.flyway.schemas=auth
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ------------------------------------------------------------
# RABBITMQ — Mensajeria asincrona
# Eventos que publica: user.registered, user.deleted
# ------------------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ------------------------------------------------------------
# EUREKA — Registro del servicio
# ------------------------------------------------------------
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka

# ------------------------------------------------------------
# ACTUATOR — Metricas y health
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# JWT — Firmado de tokens
# Cambiar JWT_SECRET en produccion (minimo 32 caracteres / 256 bits)
# ------------------------------------------------------------
jwt.secret=${JWT_SECRET:pesito-secret-key-2026-this-must-be-at-least-256bits-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ------------------------------------------------------------
# APP — URLs del frontend y del gateway (para OAuth2 callbacks y emails)
# ------------------------------------------------------------
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# ------------------------------------------------------------
# OAUTH2 — Google y GitHub
# ClientRegistrationRepository se crea condicionalmente en OAuth2ClientConfig
# solo cuando GOOGLE_CLIENT_ID o GITHUB_CLIENT_ID tienen valor.
# Excluir el autoconfigure evita la validación de client-id al arrancar.
# ------------------------------------------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

# ------------------------------------------------------------
# MAIL — Verificacion de emails
# En desarrollo usar Mailhog (SMTP: localhost:1025, sin auth)
# En produccion configurar SMTP real via env vars
# ------------------------------------------------------------
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@pesito.app}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:false}
