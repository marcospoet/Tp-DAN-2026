# ============================================================
# AUTH SERVICE — Perfil local (desarrollo)
# Se activa con: mvn spring-boot:run "-Dspring-boot.run.profiles=local"
#
# SEGURIDAD: Este archivo se commitea porque solo contiene
# credenciales de desarrollo (mismas que .env.example).
# Nunca usar estos valores en produccion.
# ============================================================

# Sobreescribe los defaults de application.properties para
# que coincidan con los valores del docker-compose local.
spring.datasource.password=admin

spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

# ------------------------------------------------------------
# Secretos de desarrollo — en la config base no hay
# defaults, asi que produccion falla al arrancar si faltan.
# ------------------------------------------------------------
jwt.secret=pesito-secret-key-2026-this-must-be-at-least-256bits-long
app.encryption.secret=pesito-dev-encryption-secret-change-in-prod
app.internal-api-secret=pesito-dev-internal-api-secret-local-only
