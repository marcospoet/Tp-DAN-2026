# ============================================================
# AI SERVICE — Perfil local (desarrollo)
# Se activa con: mvn spring-boot:run "-Dspring-boot.run.profiles=local"
#
# SEGURIDAD: Este archivo se commitea porque solo contiene
# credenciales de desarrollo (mismas que .env.example).
# Nunca usar estos valores en produccion.
# Ajustar si tu .env local usa otras passwords para la infra.
# ============================================================

spring.data.mongodb.uri=mongodb://ai_user:admin@localhost:27017/ai_db?authSource=ai_db

spring.datasource.password=admin

spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

# Mismo secreto de desarrollo que auth-service (perfil local)
ai.internal-api-secret=pesito-dev-internal-api-secret-local-only
