# ============================================================
# AI SERVICE — application.properties
# ============================================================

server.port=8083
spring.application.name=ai-service

# ------------------------------------------------------------
# MONGODB — unica base de datos de este servicio
# Este servicio NO accede a PostgreSQL
# Colecciones: chat_sessions, chat_messages, analytics_cache
# ------------------------------------------------------------
spring.data.mongodb.uri=mongodb://${MONGO_USER:ai_user}:${MONGO_PASSWORD:ai_pass}@${MONGO_HOST:localhost}:27017/ai_db?authSource=ai_db
spring.data.mongodb.auto-index-creation=true

# ------------------------------------------------------------
# RABBITMQ
# Eventos que consume: transaction.created (invalida cache de analytics)
# Eventos que publica: (ninguno por ahora)
# ------------------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ------------------------------------------------------------
# EUREKA
# ------------------------------------------------------------
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka

# ------------------------------------------------------------
# AI PROVIDERS — claves server-side (no las maneja el frontend)
# Configurar en .env o en variables de entorno del contenedor.
# Proveedor activo: claude | openai | gemini
# ------------------------------------------------------------
ai.provider=${AI_PROVIDER:claude}
ai.claude-api-key=${CLAUDE_API_KEY:}
ai.openai-api-key=${OPENAI_API_KEY:}
ai.gemini-api-key=${GEMINI_API_KEY:}

# ------------------------------------------------------------
# TOOL CALLING — agente con function calling sobre transaction-service
# ------------------------------------------------------------
ai.tools-enabled=${AI_TOOLS_ENABLED:true}
ai.transaction-service-base-url=http://${TRANSACTION_HOST:localhost}:8082

# ------------------------------------------------------------
# AUTH SERVICE — resolucion interna de API keys del usuario (cifradas en BD)
# ------------------------------------------------------------
ai.auth-service-base-url=http://${AUTH_HOST:localhost}:8081
ai.internal-api-secret=${INTERNAL_API_SECRET:}

# ------------------------------------------------------------
# RAG — pgvector (PostgreSQL), schema "ai"
# Knowledge base estática (Markdown/PDF) indexada bajo demanda
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pesito}?currentSchema=ai,public
spring.datasource.username=${AI_DB_USER:ai_db_user}
spring.datasource.password=${AI_DB_PASSWORD:ai_pass}
spring.flyway.schemas=ai
spring.flyway.default-schema=ai

# ------------------------------------------------------------
# CORS — permitir requests del frontend Next.js
# ------------------------------------------------------------
spring.mvc.cors.allowed-origins=http://localhost:3001,http://localhost:3000

# ------------------------------------------------------------
# ACTUATOR
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
