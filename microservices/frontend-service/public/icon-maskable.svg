<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full background for maskable (safe zone = center 80%) -->
  <rect width="512" height="512" fill="#0f172a"/>
  <!-- Wallet body (centered, scaled to stay within safe zone) -->
  <g transform="translate(134, 144)">
    <!-- Main wallet body -->
    <rect x="8" y="40" width="228" height="164" rx="18" ry="18" fill="#34d399"/>
    <!-- Wallet flap/top -->
    <path d="M8 80 L8 58 Q8 40 26 40 L218 40 Q236 40 236 58 L236 80 Z" fill="#059669"/>
    <!-- Card slot -->
    <rect x="158" y="108" width="62" height="56" rx="10" ry="10" fill="#0f172a" opacity="0.35"/>
    <!-- Coin dot -->
    <circle cx="189" cy="136" r="14" fill="#34d399" opacity="0.7"/>
  </g>
</svg>
