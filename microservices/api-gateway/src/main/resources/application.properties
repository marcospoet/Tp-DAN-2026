# ============================================================
# API GATEWAY — application.properties
# ============================================================

server.port=8080
spring.application.name=api-gateway

# ------------------------------------------------------------
# EUREKA — Service Discovery
# En Docker, EUREKA_HOST se inyecta como variable de entorno
# En local, usa localhost por defecto
# ------------------------------------------------------------
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka

# ------------------------------------------------------------
# SPRING CLOUD GATEWAY — Rutas
# lb:// indica que el destino se resuelve via Eureka con load balancing
# ------------------------------------------------------------

# Auto-discovery: registra rutas automaticamente segun los servicios en Eureka
# (util para desarrollo; en produccion usar rutas explicitas)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Ruta: auth-service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=auth-service
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# Ruta: transaction-service
spring.cloud.gateway.routes[1].id=transaction-service
spring.cloud.gateway.routes[1].uri=lb://transaction-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/transactions/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=transaction-service
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/transactions

# Ruta: ai-service
spring.cloud.gateway.routes[2].id=ai-service
spring.cloud.gateway.routes[2].uri=lb://ai-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=ai-service
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/ai

# Ruta: exchange-rates (manejado por transaction-service)
spring.cloud.gateway.routes[3].id=exchange-rates
spring.cloud.gateway.routes[3].uri=lb://transaction-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/rates/**
spring.cloud.gateway.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=transaction-service
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/transactions

# Ruta: OAuth2 authorize (inicio del flujo)
spring.cloud.gateway.routes[4].id=oauth2-authorize
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/oauth2/**

# Ruta: OAuth2 callback (Google/GitHub redirigen aqui tras autenticacion)
spring.cloud.gateway.routes[5].id=oauth2-callback
spring.cloud.gateway.routes[5].uri=lb://auth-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/login/oauth2/**

# ------------------------------------------------------------
# CORS — permite requests del frontend Next.js (:3001)
# Se aplica a todas las rutas del gateway
# ------------------------------------------------------------
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
# Whitelist explicita: X-User-Id NO se acepta del navegador, lo inyecta el gateway desde el JWT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=Authorization,Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ------------------------------------------------------------
# RESILIENCE4J — Retry
# CircuitBreaker y TimeLimiter se configuran via Java en ResilienceConfig.java
# ------------------------------------------------------------
resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=300ms

resilience4j.retry.instances.transaction-service.max-attempts=3
resilience4j.retry.instances.transaction-service.wait-duration=300ms

resilience4j.retry.instances.ai-service.max-attempts=2
resilience4j.retry.instances.ai-service.wait-duration=500ms

# ------------------------------------------------------------
# ACTUATOR
# ------------------------------------------------------------
# ------------------------------------------------------------
# JWT — mismo secreto que auth-service para validar tokens
# SIN default: el valor de desarrollo vive en application-local.properties
# ------------------------------------------------------------
jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=health,info,prometheus,gateway,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
management.health.circuitbreakers.enabled=true
