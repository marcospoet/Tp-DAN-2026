# ============================================================
# EUREKA SERVER — application.properties
# ============================================================

server.port=8761
spring.application.name=eureka-server

# El servidor no se registra a si mismo ni busca otros servidores Eureka
# (modo standalone — suficiente para desarrollo y TP)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Reduce el tiempo de espera al arrancar sin clientes conectados
eureka.server.wait-time-in-ms-when-sync-empty=0

# Actuator: solo health e info expuestos (sin datos sensibles)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
