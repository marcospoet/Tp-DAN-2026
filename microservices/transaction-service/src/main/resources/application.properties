# ============================================================
# TRANSACTION SERVICE — application.properties
# ============================================================

server.port=8082
spring.application.name=transaction-service

# ------------------------------------------------------------
# POSTGRESQL — schema: txn
# Usuario separado del de auth-service (Single Source of Truth)
# txn_user solo tiene acceso al schema txn, no al schema auth
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pesito}
spring.datasource.username=${TXN_DB_USER:txn_user}
# SIN default: para desarrollo local usar el perfil "local"
spring.datasource.password=${TXN_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=txn
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Liberar la conexion JDBC al salir del service (no retenerla durante la serializacion del response)
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# FLYWAY — Migraciones
# ------------------------------------------------------------
spring.flyway.schemas=txn
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ------------------------------------------------------------
# RABBITMQ
# Eventos que consume: user.deleted
# Eventos que publica: transaction.created, budget.threshold.exceeded
# ------------------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ------------------------------------------------------------
# EUREKA
# ------------------------------------------------------------
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka

# ------------------------------------------------------------
# RESILIENCE4J — Protección de llamadas a DolarAPI
# ------------------------------------------------------------
resilience4j.circuitbreaker.instances.dolar-api.sliding-window-size=5
resilience4j.circuitbreaker.instances.dolar-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.dolar-api.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.dolar-api.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.dolar-api.register-health-indicator=true

resilience4j.retry.instances.dolar-api.max-attempts=3
resilience4j.retry.instances.dolar-api.wait-duration=1s
resilience4j.retry.instances.dolar-api.retry-exceptions[0]=java.io.IOException
resilience4j.retry.instances.dolar-api.retry-exceptions[1]=org.springframework.web.reactive.function.client.WebClientException

# ------------------------------------------------------------
# ACTUATOR
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ------------------------------------------------------------
# MINIO — object storage para comprobantes (receipts)
# ------------------------------------------------------------
minio.endpoint=http://${MINIO_HOST:localhost}:9000
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=receipts

# ------------------------------------------------------------
# MULTIPART — límite de subida de archivos
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ------------------------------------------------------------
# CACHÉ — Caffeine (cotizaciones DolarAPI)
# exchange-rates: TTL 5 min, máx 100 entradas
# ------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.cache-names=exchange-rates
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=5m
