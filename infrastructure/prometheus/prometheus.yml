# ============================================================
# Prometheus — Configuración de scraping
# Recolecta métricas de todos los microservicios Spring Boot
# via /actuator/prometheus
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eureka-server'
    static_configs:
      - targets: ['eureka-server:8761']
    metrics_path: '/actuator/prometheus'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['transaction-service:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']    # RabbitMQ Prometheus plugin
